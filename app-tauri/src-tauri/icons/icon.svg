<?xml version="1.0" encoding="UTF-8"?>
<!-- Vocium app icon — master (vector source of truth). Concept B+ :
     voice equalizer bars tracing a "V" + AI sparkle, teal→inject-violet
     gradient (brand palette). Full-bleed 256 square (Windows-safe; OS rounds
     where it wants). Rasterize via scripts/gen-icons.mjs. -->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="tileBG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2330"/><stop offset="1" stop-color="#0c0f15"/>
    </linearGradient>
    <radialGradient id="glowAI" cx="50%" cy="44%" r="62%">
      <stop offset="0" stop-color="#8f7cff" stop-opacity=".30"/>
      <stop offset="50%" stop-color="#6ad0c8" stop-opacity=".10"/>
      <stop offset="100%" stop-color="#6ad0c8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aiGradV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8ff0e6"/>
      <stop offset="55%" stop-color="#5cc7be"/>
      <stop offset="100%" stop-color="#8a6cff"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" fill="url(#tileBG)"/>
  <rect width="256" height="256" fill="url(#glowAI)"/>

  <g fill="url(#aiGradV)">
    <rect x="50"  y="86"  width="22" height="78"  rx="11"/>
    <rect x="86"  y="108" width="22" height="100" rx="11"/>
    <rect x="117" y="132" width="22" height="80"  rx="11"/>
    <rect x="148" y="108" width="22" height="100" rx="11"/>
    <rect x="184" y="86"  width="22" height="78"  rx="11"/>
  </g>

  <!-- AI sparkle nested in the V opening (baked transform so it rasterizes
       identically everywhere — not a <use>, which doesn't size on <path>). -->
  <path d="M16 1 C17.6 9.5 22.5 14.4 31 16 C22.5 17.6 17.6 22.5 16 31
           C14.4 22.5 9.5 17.6 1 16 C9.5 14.4 14.4 9.5 16 1 Z"
        fill="#cfeee9" transform="translate(97 41) scale(1.93)"/>
</svg>
