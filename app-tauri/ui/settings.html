<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vocium 設定</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="settings-body">
  <div class="settings">
    <div class="s-body">
      <div class="s-tabs" id="tabs" role="tablist">
        <span class="s-tab active" role="tab" data-tab="general" tabindex="0">一般</span>
        <span class="s-tab" role="tab" data-tab="stt" tabindex="-1">語音轉文字</span>
        <span class="s-tab" role="tab" data-tab="polish" tabindex="-1">AI 潤稿</span>
      </div>

      <!-- ===== 一般 ===== -->
      <div class="s-pane active" id="pane-general">
        <div class="field">
          <div class="flabel">全域快捷鍵</div>
          <div class="hkrow">
            <div class="hkcombo" id="combo"></div>
            <div class="recbtn" id="rec">錄製</div>
          </div>
          <div class="s-err" id="err" style="display:none"></div>
        </div>
        <div class="field">
          <div class="flabel">中文輸出（中文字繁／簡）</div>
          <div class="seg" id="zhSeg" role="radiogroup" aria-label="中文輸出字體">
            <span class="seg-opt" role="radio" aria-checked="true" tabindex="0" data-mode="twp">繁體（台灣）</span>
            <span class="seg-opt" role="radio" aria-checked="false" tabindex="-1" data-mode="cn">簡體</span>
          </div>
        </div>
        <div class="field">
          <div class="flabel">輸入模式</div>
          <div class="seg" id="imSeg" role="radiogroup" aria-label="輸入模式">
            <span class="seg-opt" role="radio" aria-checked="true" tabindex="0" data-im="toggle">切換</span>
            <span class="seg-opt" role="radio" aria-checked="false" tabindex="-1" data-im="ptt">按住說</span>
          </div>
        </div>
        <div class="field">
          <div class="flabel">靜音修剪（VAD）</div>
          <div class="seg" id="vadSeg" role="radiogroup" aria-label="靜音修剪">
            <span class="seg-opt" role="radio" aria-checked="true" tabindex="0" data-vad="off">關</span>
            <span class="seg-opt" role="radio" aria-checked="false" tabindex="-1" data-vad="on">開</span>
          </div>
        </div>
      </div>

      <!-- ===== 語音轉文字 ===== -->
      <div class="s-pane" id="pane-stt">
        <div class="field">
          <div class="flabel" id="provSelLabel">STT 來源</div>
          <select class="selfield" id="provSel" aria-labelledby="provSelLabel">
            <option value="groq">Groq</option>
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini</option>
            <option value="local">本地</option>
          </select>
        </div>
        <div id="provFields">
          <div class="field">
            <div class="flabel" id="keyLabel">Groq API Key</div>
            <div class="keywrap">
              <input id="keyInput" type="password" placeholder="貼上金鑰後按儲存"
                     autocomplete="off" spellcheck="false" class="keyinput" aria-labelledby="keyLabel" />
              <span class="eye" id="keyToggle" role="button" title="顯示/隱藏" aria-label="顯示或隱藏金鑰"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></span>
            </div>
            <div class="s-err" id="keyErr" style="display:none"></div>
            <span class="clearkey" id="keyClear" role="button" hidden>✕ 清除金鑰</span>
          </div>
          <div class="field">
            <div class="flabel" id="modelSelLabel">模型</div>
            <select class="selfield" id="modelSel" aria-labelledby="modelSelLabel"></select>
            <input id="modelCustom" class="keyinput" style="display:none;margin-top:8px"
                   placeholder="輸入 model id" autocomplete="off" spellcheck="false" aria-label="自訂 model id" />
          </div>
          <div class="field" id="baseUrlField" style="display:none">
            <div class="flabel" id="baseUrlLabel">Base URL（選填）</div>
            <input id="baseUrlInput" class="keyinput" autocomplete="off" spellcheck="false"
                   placeholder="https://api.openai.com/v1" aria-labelledby="baseUrlLabel" />
          </div>
        </div>
        <div class="field" id="localStub" style="display:none">
          <div class="flabel">本地語音轉文字</div>
          <div class="s-stub">本地 STT 即將推出，請先選擇雲端來源（Groq / OpenAI / Gemini）。<br>目前啟用來源不變。</div>
        </div>
      </div>

      <!-- ===== AI 潤稿 (stub) ===== -->
      <div class="s-pane" id="pane-polish">
        <div class="field soon">
          <div class="flabel">AI 潤稿</div>
          <div class="s-stub">轉錄後 AI 潤飾（清贅詞／補標點，不改原意）即將推出。<br>屆時此頁含：開關 · 供應商 · 金鑰 · 模型 · 風格。</div>
        </div>
      </div>
    </div>
    <div class="s-foot">
      <div class="sbtn" id="cancel">取消</div>
      <div class="sbtn primary" id="save">儲存並套用</div>
    </div>
  </div>
  <script src="settings.js"></script>
</body>
</html>
