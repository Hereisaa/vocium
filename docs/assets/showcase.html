<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<!-- FIDELITY: this links the REAL app stylesheet and uses the REAL markup
     (verbatim from app-tauri/ui/index.html). The pill / orb / controls /
     icons are governed entirely by the shipped styles.css — nothing here
     restyles them. The only harness CSS is (1) the banner backdrop/lockup
     chrome and (2) revealing .controls + scaling the component up, since a
     headless screenshot can't :hover. Rendered → docs/assets/showcase.png. -->
<link rel="stylesheet" href="../../app-tauri/ui/styles.css" />
<style>
  :root{
    --bg:#0e1117; --panel-2:#1c2230; --stroke:rgba(255,255,255,.08);
    --text:#e6edf3; --text-dim:#8b949e; --accent:#6ad0c8;
    --font:'Segoe UI',system-ui,-apple-system,'Microsoft JhengHei',sans-serif;
  }
  /* override the app's transparent full-bleed body just for this banner */
  html,body{
    width:1200px;height:440px;overflow:hidden;
    background:radial-gradient(1100px 540px at 26% -18%,#1b3a3a 0%,#11161f 52%,var(--bg) 100%);
    display:flex;align-items:center;justify-content:flex-start;gap:40px;padding:0 64px;
  }
  .brand{display:flex;flex-direction:column;gap:14px;width:330px;flex:none;
    font-family:var(--font);color:var(--text)}
  .brand img{width:92px;height:92px;border-radius:24%;
    box-shadow:0 10px 34px rgba(0,0,0,.5)}
  .brand h1{font-size:44px;font-weight:800;letter-spacing:.5px}
  .brand h1 .k{color:var(--accent)}
  .brand p{color:var(--text-dim);font-size:14.5px;line-height:1.6}
  .kbd{display:inline-block;font-size:12px;color:var(--text);background:var(--panel-2);
    border:1px solid var(--stroke);border-bottom-width:2px;border-radius:6px;
    padding:3px 9px;font-weight:600;font-family:var(--font)}
  /* faux desktop so the always-on-top pill reads in context */
  .desk{flex:1;position:relative;height:300px;border-radius:16px;
    border:1px solid var(--stroke);overflow:hidden;
    background:linear-gradient(160deg,#22343a,#11161f);
    box-shadow:0 8px 30px rgba(0,0,0,.5)}
  .desk .bar{position:absolute;inset:0 0 auto 0;height:30px;background:rgba(0,0,0,.28);
    display:flex;align-items:center;gap:7px;padding:0 13px}
  .desk .bar i{width:11px;height:11px;border-radius:50%}
  .desk .bar .r{background:#ff5f57}.desk .bar .y{background:#febc2e}.desk .bar .g{background:#28c840}
  .desk .cap{position:absolute;left:22px;bottom:16px;color:var(--text-dim);
    font-size:12px;font-family:var(--font)}
  /* hold the real component, scaled up (proportion preserved — no restyle) */
  .holder{position:absolute;top:96px;left:50%;transform:translateX(-50%) scale(2.3);
    transform-origin:top center}
  /* equivalent of the app's :hover end-state (headless can't hover) */
  .holder .controls{opacity:1;transform:none;pointer-events:auto}
</style>
</head>
<body>
  <div class="brand">
    <img src="../../app-tauri/src-tauri/icons/icon.svg" alt="Vocium" />
    <h1>Voc<span class="k">ium</span></h1>
    <p>桌面語音輸入工具 · 按快捷鍵或點 ICON，說話即轉文字並貼進焦點視窗。<br/>
       A desktop voice‑input tool — speak, and it types for you.</p>
    <div><span class="kbd">Ctrl</span> <span class="kbd">Shift</span> <span class="kbd">Space</span></div>
  </div>

  <div class="desk">
    <div class="bar"><i class="r"></i><i class="y"></i><i class="g"></i></div>

    <!-- ===== VERBATIM real app markup (app-tauri/ui/index.html) ===== -->
    <div class="holder">
      <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <symbol id="ic-min" viewBox="0 0 24 24"><path d="M6 17h12" /></symbol>
        <symbol id="ic-unlock" viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="10" rx="2.2" /><path d="M8 11V7a4 4 0 0 1 7.6-1.7" /></symbol>
        <symbol id="ic-lock" viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="10" rx="2.2" /><path d="M8 11V7a4 4 0 0 1 8 0v4" /></symbol>
        <symbol id="ic-close" viewBox="0 0 24 24"><path d="M6 6l12 12" /><path d="M18 6 6 18" /></symbol>
      </svg>
      <div class="iconwin">
        <div class="controls" id="controls">
          <button class="wbtn lock" id="btnLock" title="鎖定/解除水平拖曳">
            <svg class="i"><use href="#ic-unlock" id="lockUse" /></svg>
          </button>
          <button class="wbtn min" id="btnMin" title="縮小到系統匣">
            <svg class="i"><use href="#ic-min" /></svg>
          </button>
          <button class="wbtn close" id="btnClose" title="結束 Vocium">
            <svg class="i"><use href="#ic-close" /></svg>
          </button>
        </div>
        <div class="pill s-listen" id="pill">
          <div class="orb" id="orb" title="點此或按快捷鍵開始／停止">
            <div class="core"></div>
            <div class="ring"></div>
            <div class="bars">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
          <div class="meta" id="meta" title="拖曳此處可水平移動">
            <div class="label" id="label">聆聽中…</div>
          </div>
        </div>
      </div>
    </div>
    <!-- ===== end verbatim ===== -->

    <div class="cap">永遠最上層 · 不搶焦點 · 滑鼠移上才顯示控制鈕（鎖定／縮小／關閉）</div>
  </div>
</body>
</html>
