<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<style>
  /* Standalone product banner — same brand tokens as the app. Rendered headless
     to docs/assets/showcase.png; not shipped in the app. Fixed 1200×470. */
  :root{
    --bg:#0e1117; --panel:#161b22; --panel-2:#1c2230; --stroke:rgba(255,255,255,.08);
    --text:#e6edf3; --text-dim:#8b949e; --accent:#6ad0c8; --listen:#3ddc97;
    --transcribe:#f5a623; --inject:#7c5cff; --error:#ff5d5d;
    --pill-bg:rgba(22,27,34,.94); --pill-stroke:rgba(255,255,255,.10);
    --font:'Segoe UI',system-ui,-apple-system,'Microsoft JhengHei',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:470px;overflow:hidden}
  body{font-family:var(--font);color:var(--text);
    background:radial-gradient(1100px 560px at 28% -16%,#1b3a3a 0%,#11161f 52%,var(--bg) 100%);
    display:flex;align-items:center;gap:46px;padding:0 60px}

  /* left: brand lockup */
  .brand{display:flex;flex-direction:column;gap:16px;width:360px;flex:none}
  .brand img{width:96px;height:96px;border-radius:24%;
    box-shadow:0 10px 34px rgba(0,0,0,.5)}
  .brand h1{font-size:46px;font-weight:800;letter-spacing:.5px}
  .brand h1 .k{color:var(--accent)}
  .brand p{color:var(--text-dim);font-size:15px;line-height:1.65}
  .brand .kbd{display:inline-block;font-size:12px;color:var(--text);
    background:var(--panel-2);border:1px solid var(--stroke);border-bottom-width:2px;
    border-radius:6px;padding:3px 9px;font-weight:600;margin-top:4px}

  /* right: faux desktop with the floating pill + the five states */
  .stage{flex:1;display:flex;flex-direction:column;gap:22px}
  .desk{position:relative;height:188px;border-radius:16px;border:1px solid var(--stroke);
    background:linear-gradient(160deg,#22343a,#11161f);overflow:hidden;
    box-shadow:var(--shadow,0 8px 30px rgba(0,0,0,.5))}
  .desk .bar{position:absolute;inset:0 0 auto 0;height:30px;background:rgba(0,0,0,.28);
    display:flex;align-items:center;gap:7px;padding:0 13px}
  .dot{width:11px;height:11px;border-radius:50%}
  .dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .desk .cap{position:absolute;left:24px;bottom:16px;color:var(--text-dim);font-size:12px}
  .float{position:absolute;top:54px;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:flex-end}
  .ctrls{display:flex;gap:9px;margin:0 4px 6px 0}
  .wb{width:22px;height:22px;display:grid;place-items:center;color:var(--text-dim);
    background:rgba(255,255,255,.05);border:1px solid var(--stroke);border-radius:6px}
  .wb.x{color:var(--error)}
  .wb svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round}
  .pill{display:inline-flex;align-items:center;gap:11px;height:54px;padding:0 16px;
    background:var(--pill-bg);border:1px solid var(--pill-stroke);border-radius:16px;
    box-shadow:0 3px 12px rgba(0,0,0,.5)}
  .orb{position:relative;width:34px;height:34px;display:grid;place-items:center}
  .bars{display:flex;align-items:flex-end;gap:3px;height:22px}
  .bars i{width:3px;border-radius:2px;background:var(--listen)}
  .bars i:nth-child(1){height:9px}.bars i:nth-child(2){height:20px}
  .bars i:nth-child(3){height:13px}.bars i:nth-child(4){height:22px}
  .bars i:nth-child(5){height:11px}
  .ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--listen);opacity:.5}
  .lbl{font-size:14px;font-weight:600;letter-spacing:.3px;white-space:nowrap}

  .states{display:flex;gap:14px}
  .st{flex:1;display:flex;align-items:center;gap:9px;background:var(--panel);
    border:1px solid var(--stroke);border-radius:11px;padding:11px 13px}
  .st .d{width:13px;height:13px;border-radius:50%;flex:none}
  .st b{font-size:12.5px;font-weight:600}
  .st span{display:block;font-size:10.5px;color:var(--text-dim);margin-top:1px}
  .c-idle{background:var(--accent)} .c-listen{background:var(--listen)}
  .c-trans{background:var(--transcribe)} .c-inject{background:var(--inject)}
  .c-error{background:var(--error)}
</style>
</head>
<body>
  <div class="brand">
    <img src="../../app-tauri/src-tauri/icons/icon.svg" alt="Vocium" />
    <h1>Voc<span class="k">ium</span></h1>
    <p>桌面語音輸入工具 · 按快捷鍵或點 ICON，說話即轉文字並貼進焦點視窗。<br/>
       A desktop voice‑input tool — speak, and it types for you.</p>
    <div><span class="kbd">Ctrl</span> <span class="kbd">Shift</span> <span class="kbd">Space</span></div>
  </div>

  <div class="stage">
    <div class="desk">
      <div class="bar"><i class="dot r"></i><i class="dot y"></i><i class="dot g"></i></div>
      <div class="float">
        <div class="ctrls">
          <div class="wb"><svg viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="10" rx="2.2"/><path d="M8 11V7a4 4 0 0 1 7.6-1.7"/></svg></div>
          <div class="wb"><svg viewBox="0 0 24 24"><path d="M6 17h12"/></svg></div>
          <div class="wb x"><svg viewBox="0 0 24 24"><path d="M6 6l12 12"/><path d="M18 6 6 18"/></svg></div>
        </div>
        <div class="pill">
          <div class="orb"><div class="ring"></div>
            <div class="bars"><i></i><i></i><i></i><i></i><i></i></div>
          </div>
          <div class="lbl">聆聽中…</div>
        </div>
      </div>
      <div class="cap">永遠最上層 · 不搶焦點 · 滑鼠移上才顯示控制鈕（鎖定/縮小/關閉）</div>
    </div>

    <div class="states">
      <div class="st"><span class="d c-idle"></span><div><b>待命 idle</b><span>呼吸光暈</span></div></div>
      <div class="st"><span class="d c-listen"></span><div><b>聆聽 listening</b><span>聲波</span></div></div>
      <div class="st"><span class="d c-trans"></span><div><b>轉錄 transcribing</b><span>Groq Whisper</span></div></div>
      <div class="st"><span class="d c-inject"></span><div><b>輸入 injecting</b><span>貼入焦點</span></div></div>
      <div class="st"><span class="d c-error"></span><div><b>錯誤 error</b><span>自動回復</span></div></div>
    </div>
  </div>
</body>
</html>
