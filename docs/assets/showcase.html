<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<!-- Banner == the five-state cards from docs/DESIGN_MOCKUP.html, verbatim
     tokens + .iconwin/.controls/.wbtn/.pill/.orb/state keyframes + .card/.tag.
     This is the agreed real visual spec. Rendered → docs/assets/showcase.png. -->
<style>
  :root{
    --bg-desktop:#0e1117; --panel:#161b22; --panel-2:#1c2230;
    --stroke:rgba(255,255,255,.08); --text:#e6edf3; --text-dim:#8b949e;
    --accent:#6ad0c8; --listen:#3ddc97; --transcribe:#f5a623;
    --inject:#7c5cff; --error:#ff5d5d;
    --pill-bg:rgba(22,27,34,.92); --pill-stroke:rgba(255,255,255,.10);
    --radius:16px; --shadow:0 8px 30px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04) inset;
    --font:'Segoe UI',system-ui,-apple-system,'Microsoft JhengHei',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1280px;height:470px;overflow:hidden}
  body{font-family:var(--font);color:var(--text);padding:34px 44px;
    background:radial-gradient(1200px 560px at 26% -16%,#1b3a3a 0%,#11161f 52%,var(--bg-desktop) 100%);
    display:flex;flex-direction:column;gap:26px}

  .hero{display:flex;align-items:center;gap:20px}
  .hero img{width:64px;height:64px;border-radius:24%;box-shadow:0 8px 26px rgba(0,0,0,.5)}
  .hero h1{font-size:34px;font-weight:800;letter-spacing:.5px;line-height:1}
  .hero h1 .k{color:var(--accent)}
  .hero .tag1{color:var(--text);font-size:15px;font-weight:600;margin-top:7px}
  .hero .tag2{color:var(--text-dim);font-size:12.5px;margin-top:3px;letter-spacing:.3px}

  .grid{display:flex;gap:16px;flex:1}
  .card{flex:1;background:var(--panel);border:1px solid var(--stroke);
    border-radius:14px;padding:24px 14px 20px;display:flex;flex-direction:column;
    align-items:center;gap:16px}
  .card .tag{font-size:11.5px;color:var(--text-dim);text-align:center;line-height:1.5}
  .card .tag b{color:var(--text);display:block;font-size:13px;margin-bottom:4px;letter-spacing:.4px}

  .iconwin{position:relative;display:inline-block;padding-top:26px}
  .controls{position:absolute;top:0;right:2px;display:flex;gap:9px;align-items:center}
  .wbtn{width:22px;height:22px;display:grid;place-items:center;color:var(--text-dim);
    background:transparent;border:0;border-radius:6px}
  .wbtn .i{width:15px;height:15px;display:block;fill:none;stroke:currentColor;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .wbtn.close{color:var(--error);opacity:.85}
  .wbtn.lock.on{color:var(--accent)}

  .pill{display:inline-flex;align-items:center;gap:9px;width:auto;height:52px;
    padding:0 13px 0 11px;background:var(--pill-bg);border:1px solid var(--pill-stroke);
    border-radius:var(--radius);backdrop-filter:blur(14px);box-shadow:var(--shadow);
    user-select:none}
  .orb{position:relative;width:36px;height:36px;flex:none;display:grid;place-items:center}
  .orb .core{width:16px;height:16px;border-radius:50%;background:var(--accent);transition:background .25s}
  .orb .ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent}
  .label{font-size:14px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
  .meta{display:flex;align-items:center;line-height:1}
  .bars{display:none;align-items:flex-end;gap:3px;height:24px}
  .bars span{width:3px;background:var(--listen);border-radius:2px;height:6px}

  .s-idle .core{width:19px;height:19px;background:var(--accent);animation:breathe 2.6s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(.82);opacity:.7}50%{transform:scale(1);opacity:1}}
  .s-listen .core{display:none}
  .s-listen .bars{display:flex}
  .s-listen .orb .ring{border-color:var(--listen);animation:pulsering 1.4s ease-out infinite}
  .s-listen .bars span{animation:eq .9s ease-in-out infinite}
  .s-listen .bars span:nth-child(1){animation-delay:0s}
  .s-listen .bars span:nth-child(2){animation-delay:.15s}
  .s-listen .bars span:nth-child(3){animation-delay:.3s}
  .s-listen .bars span:nth-child(4){animation-delay:.45s}
  .s-listen .bars span:nth-child(5){animation-delay:.2s}
  @keyframes eq{0%,100%{height:5px}50%{height:24px}}
  @keyframes pulsering{0%{transform:scale(.7);opacity:.9}100%{transform:scale(1.7);opacity:0}}
  .s-trans .core{background:var(--transcribe)}
  .s-trans .orb .ring{border-top-color:var(--transcribe);border-right-color:var(--transcribe);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .s-inject .core{background:var(--inject);width:20px;height:20px;
    clip-path:polygon(43% 73%,18% 50%,9% 60%,43% 91%,91% 33%,82% 24%);border-radius:0;animation:pop .4s ease}
  .s-inject .orb .ring{border-color:var(--inject);opacity:.4}
  @keyframes pop{0%{transform:scale(.2);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1)}}
  .s-error .core{background:var(--error);animation:shake .4s ease 2}
  .s-error .orb .ring{border-color:var(--error);opacity:.5}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <symbol id="ic-min" viewBox="0 0 24 24"><path d="M6 17h12"/></symbol>
    <symbol id="ic-unlock" viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="10" rx="2.2"/><path d="M8 11V7a4 4 0 0 1 7.6-1.7"/></symbol>
    <symbol id="ic-close" viewBox="0 0 24 24"><path d="M6 6l12 12"/><path d="M18 6 6 18"/></symbol>
  </svg>

  <div class="hero">
    <img src="../../app-tauri/src-tauri/icons/icon.svg" alt="Vocium" />
    <div>
      <h1>Voc<span class="k">ium</span></h1>
      <div class="tag1">AI 智慧語音輸入 — 一鍵開口，文字即刻落鍵到任何視窗</div>
      <div class="tag2">AI‑powered voice typing for the desktop · Groq Whisper · Windows</div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="iconwin">
        <div class="controls">
          <span class="wbtn lock"><svg class="i"><use href="#ic-unlock"/></svg></span>
          <span class="wbtn min"><svg class="i"><use href="#ic-min"/></svg></span>
          <span class="wbtn close"><svg class="i"><use href="#ic-close"/></svg></span>
        </div>
        <div class="pill s-idle">
          <div class="orb"><div class="core"></div><div class="ring"></div>
            <div class="bars"><span></span><span></span><span></span><span></span><span></span></div></div>
          <div class="meta"><div class="label">Vocium</div></div>
        </div>
      </div>
      <div class="tag"><b>idle 待命</b>待命中，等待喚醒</div>
    </div>

    <div class="card">
      <div class="iconwin">
        <div class="controls">
          <span class="wbtn lock"><svg class="i"><use href="#ic-unlock"/></svg></span>
          <span class="wbtn min"><svg class="i"><use href="#ic-min"/></svg></span>
          <span class="wbtn close"><svg class="i"><use href="#ic-close"/></svg></span>
        </div>
        <div class="pill s-listen">
          <div class="orb"><div class="core"></div><div class="ring"></div>
            <div class="bars"><span></span><span></span><span></span><span></span><span></span></div></div>
          <div class="meta"><div class="label">聆聽中…</div></div>
        </div>
      </div>
      <div class="tag"><b>listening 聆聽</b>聆聽你的聲音</div>
    </div>

    <div class="card">
      <div class="iconwin">
        <div class="controls">
          <span class="wbtn lock"><svg class="i"><use href="#ic-unlock"/></svg></span>
          <span class="wbtn min"><svg class="i"><use href="#ic-min"/></svg></span>
          <span class="wbtn close"><svg class="i"><use href="#ic-close"/></svg></span>
        </div>
        <div class="pill s-trans">
          <div class="orb"><div class="core"></div><div class="ring"></div>
            <div class="bars"><span></span><span></span><span></span><span></span><span></span></div></div>
          <div class="meta"><div class="label">轉錄中…</div></div>
        </div>
      </div>
      <div class="tag"><b>transcribing 轉錄</b>AI 轉錄中 · Groq Whisper</div>
    </div>

    <div class="card">
      <div class="iconwin">
        <div class="controls">
          <span class="wbtn lock"><svg class="i"><use href="#ic-unlock"/></svg></span>
          <span class="wbtn min"><svg class="i"><use href="#ic-min"/></svg></span>
          <span class="wbtn close"><svg class="i"><use href="#ic-close"/></svg></span>
        </div>
        <div class="pill s-inject">
          <div class="orb"><div class="core"></div><div class="ring"></div>
            <div class="bars"><span></span><span></span><span></span><span></span><span></span></div></div>
          <div class="meta"><div class="label">輸入完成</div></div>
        </div>
      </div>
      <div class="tag"><b>injecting 注入</b>文字已自動輸入焦點視窗</div>
    </div>

    <div class="card">
      <div class="iconwin">
        <div class="controls">
          <span class="wbtn lock"><svg class="i"><use href="#ic-unlock"/></svg></span>
          <span class="wbtn min"><svg class="i"><use href="#ic-min"/></svg></span>
          <span class="wbtn close"><svg class="i"><use href="#ic-close"/></svg></span>
        </div>
        <div class="pill s-error">
          <div class="orb"><div class="core"></div><div class="ring"></div>
            <div class="bars"><span></span><span></span><span></span><span></span><span></span></div></div>
          <div class="meta"><div class="label">發生問題</div></div>
        </div>
      </div>
      <div class="tag"><b>error 錯誤</b>發生問題，自動回復</div>
    </div>
  </div>
</body>
</html>
